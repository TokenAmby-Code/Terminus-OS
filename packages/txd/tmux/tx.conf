# Canonical tmux interaction configuration for the tx estate.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g history-limit 50000
set -g mouse on
setw -g aggressive-resize on

set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
setw -g automatic-rename off
set -g allow-rename off

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix
bind Escape { }

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left-length 50
set -g status-left "#[fg=colour39,bold] #S #[default]| "
set -g status-right ""
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour39,bold] #I:#W #[default]"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g pane-border-status top
set -g pane-border-format "#{?@PANE_LABEL, #[fg=colour231]#[bg=colour31]#[bold] #{@PANE_LABEL} #[default] ,}"

# Pane navigation and expansion. Prefix e toggles native zoom immediately.
# Prefix h/j/k/l moves once and opens a transient table where bare h/j/k/l or
# arrows keep moving; Enter zooms the selected pane and Escape/q cancel.
bind e resize-pane -Z
bind h { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; select-pane -L ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind j { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; select-pane -D ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind k { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; select-pane -U ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind l { if -F '#{==:#{window_zoomed_flag},1}' 'resize-pane -Z' ; select-pane -R ; display-message "pane-select: h/j/k/l/arrows move, Enter expands" ; switch-client -T pane-select }
bind -T pane-select h { select-pane -L ; switch-client -T pane-select }
bind -T pane-select j { select-pane -D ; switch-client -T pane-select }
bind -T pane-select k { select-pane -U ; switch-client -T pane-select }
bind -T pane-select l { select-pane -R ; switch-client -T pane-select }
bind -T pane-select Left { select-pane -L ; switch-client -T pane-select }
bind -T pane-select Down { select-pane -D ; switch-client -T pane-select }
bind -T pane-select Up { select-pane -U ; switch-client -T pane-select }
bind -T pane-select Right { select-pane -R ; switch-client -T pane-select }
bind -T pane-select Enter resize-pane -Z
bind -T pane-select Escape display-message "pane-select cancelled"
bind -T pane-select q display-message "pane-select cancelled"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind -n C-k copy-mode -u
unbind -T copy-mode WheelUpPane
unbind -T copy-mode WheelDownPane
unbind -T copy-mode-vi WheelUpPane
unbind -T copy-mode-vi WheelDownPane
unbind -T copy-mode g
unbind -T copy-mode f
unbind -T copy-mode F
unbind -T copy-mode t
unbind -T copy-mode T
unbind -T copy-mode \;
unbind -T copy-mode ,

%if "#{||:#{||:#{m:3.[4-9]*,#{version}},#{m:3.[1-9][0-9]*,#{version}}},#{m:[4-9].*,#{version}}}"
bind -n WheelUpPane if-shell -F '#{P:#{?pane_active,#{pane_in_mode},}}' {
  run-shell -C "send-keys -t '#{P:#{?pane_active,#{pane_id},}}' -X -N 3 scroll-up"
} {
  run-shell -C "copy-mode -e -t '#{P:#{?pane_active,#{pane_id},}}' ; send-keys -t '#{P:#{?pane_active,#{pane_id},}}' -X -N 3 scroll-up"
}
bind -n WheelDownPane if-shell -F '#{P:#{?pane_active,#{pane_in_mode},}}' {
  run-shell -C "send-keys -t '#{P:#{?pane_active,#{pane_id},}}' -X -N 3 scroll-down"
} {}
%else
display-message "tx.conf: tmux < 3.4 — wheel-scroll bindings skipped (upgrade tmux)"
%endif

bind r source-file ~/runtimes/Terminus-OS/live/packages/txd/tmux/tx.conf \; display "tx.conf reloaded"
