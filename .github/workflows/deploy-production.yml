name: Deploy (production)

# Application-owned production edge. Token-Fleet owns the typed target values
# and on-box converge implementation; this workflow consumes provisioned
# repository variables and proves Terminus application truth afterward.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: terminus-os-production
  cancel-in-progress: true

jobs:
  converge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TERMINUS_SHA: ${{ github.event.workflow_run.head_sha }}
      K12_PERSONAL_FLEET_HOST: ${{ vars.K12_PERSONAL_FLEET_HOST }}
      K12_PERSONAL_FLEET_PORT: ${{ vars.K12_PERSONAL_FLEET_PORT }}
      K12_PERSONAL_FLEET_BASE: ${{ vars.K12_PERSONAL_FLEET_BASE }}
      K12_PERSONAL_TXD_HEALTH_URL: ${{ vars.K12_PERSONAL_TXD_HEALTH_URL }}
    steps:
      - name: Credential and target provisioning gate
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          missing=()
          for name in TS_OAUTH_CLIENT_ID TS_OAUTH_SECRET K12_PERSONAL_FLEET_HOST K12_PERSONAL_FLEET_PORT K12_PERSONAL_FLEET_BASE K12_PERSONAL_TXD_HEALTH_URL; do
            if [ -z "${!name:-}" ]; then missing+=("$name"); fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Terminus production deployment is not provisioned: missing ${missing[*]}"
            exit 1
          fi

      - name: Tailscale (ephemeral)
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-routes

      - name: POST k12-personal converge (ack-first, miss-tolerant)
        id: ping
        run: |
          url="http://${K12_PERSONAL_FLEET_HOST}:${K12_PERSONAL_FLEET_PORT}${K12_PERSONAL_FLEET_BASE}/converge"
          code=$(curl -sS -o /tmp/converge.json -w '%{http_code}' -m 15 -X POST "$url" || echo "000")
          if [ "$code" = "200" ]; then
            jq -e '.generation | numbers' /tmp/converge.json
            echo "acked=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::k12-personal converge door unreachable (HTTP $code) — potentially-OFF; boot convergence will self-heal this recorded miss."
            echo "acked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify acknowledged deployment reached Terminus SHA
        if: steps.ping.outputs.acked == 'true'
        run: |
          health_url="${K12_PERSONAL_TXD_HEALTH_URL%/}/ctl/health"
          for attempt in $(seq 1 24); do
            if curl -fsS -m 5 "$health_url" -o /tmp/txd-health.json; then
              deployed=$(jq -r '.git_sha // empty' /tmp/txd-health.json)
              if [ "$deployed" = "$TERMINUS_SHA" ]; then
                echo "Terminus deployment verified at $deployed"
                exit 0
              fi
            fi
            if [ "$attempt" -lt 24 ]; then sleep 5; fi
          done
          echo "::error::Acknowledged deployment did not reach Terminus SHA $TERMINUS_SHA"
          cat /tmp/txd-health.json 2>/dev/null || true
          exit 1
